---
# ── ConfigMap Grafana — Datasource + Dashboard auto-provisioning ──────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  # Datasource Prometheus
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true

  # Dashboard auto-provisionné
  dashboard-provider.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'CI/CD'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

  # Dashboard Java App + Pipeline
  java-app-dashboard.json: |
    {
      "title": "Java App — CI/CD Pipeline",
      "uid": "java-cicd",
      "timezone": "browser",
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "🟢 Application UP/DOWN",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "targets": [{
            "expr": "up{job=\"java-app\"}",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              },
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN"}, "1": {"text": "UP"}}}
              ]
            }
          }
        },
        {
          "id": 2,
          "title": "📈 Requêtes HTTP / seconde",
          "type": "timeseries",
          "gridPos": {"x": 4, "y": 0, "w": 10, "h": 8},
          "targets": [{
            "expr": "sum(rate(http_server_requests_seconds_count{job=\"java-app\"}[1m])) by (status)",
            "legendFormat": "HTTP {{status}}"
          }]
        },
        {
          "id": 3,
          "title": "⏱️ Latence HTTP P99 (ms)",
          "type": "timeseries",
          "gridPos": {"x": 14, "y": 0, "w": 10, "h": 8},
          "targets": [{
            "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=\"java-app\"}[5m])) by (le)) * 1000",
            "legendFormat": "P99 latency"
          }]
        },
        {
          "id": 4,
          "title": "🧠 Mémoire JVM Heap",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{area=\"heap\", job=\"java-app\"} / 1024 / 1024",
              "legendFormat": "Heap Used (MB)"
            },
            {
              "expr": "jvm_memory_max_bytes{area=\"heap\", job=\"java-app\"} / 1024 / 1024",
              "legendFormat": "Heap Max (MB)"
            }
          ]
        },
        {
          "id": 5,
          "title": "⚙️ CPU Usage",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "targets": [{
            "expr": "rate(process_cpu_seconds_total{job=\"java-app\"}[1m]) * 100",
            "legendFormat": "CPU %"
          }]
        },
        {
          "id": 6,
          "title": "🗄️ Connexions DB actives",
          "type": "stat",
          "gridPos": {"x": 0, "y": 16, "w": 6, "h": 4},
          "targets": [{
            "expr": "hikaricp_connections_active{job=\"java-app\"}",
            "legendFormat": "Connexions actives"
          }]
        },
        {
          "id": 7,
          "title": "🔄 Pods Running",
          "type": "stat",
          "gridPos": {"x": 6, "y": 16, "w": 6, "h": 4},
          "targets": [{
            "expr": "count(up{job=\"java-app\"} == 1)",
            "legendFormat": "Pods UP"
          }]
        },
        {
          "id": 8,
          "title": "❌ Taux d'erreur HTTP 5xx",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 16, "w": 12, "h": 8},
          "targets": [{
            "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\", job=\"java-app\"}[5m]))",
            "legendFormat": "Erreurs 5xx/s"
          }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }

---
# ── PVC Grafana ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard

---
# ── Deployment Grafana ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/java-app-dashboard.json
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yml
              subPath: dashboard-provider.yml
            - name: grafana-config
              mountPath: /var/lib/grafana/dashboards/java-app-dashboard.json
              subPath: java-app-dashboard.json
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-config
          configMap:
            name: grafana-config

---
# ── Service Grafana (NodePort 32000) ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32000     # Accès : http://192.168.43.109:32000
