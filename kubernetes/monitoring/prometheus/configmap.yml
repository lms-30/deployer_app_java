---
# =============================================================================
# Prometheus ConfigMap — Scrape configs
# Cibles : Java App (Spring Boot Actuator), K8s nodes, pods
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'k8s-kubeadm'
        environment: 'production'

    # ── Alerting ──────────────────────────────────────────────────────────────
    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    # ── Règles d'alerte ───────────────────────────────────────────────────────
    rule_files:
      - /etc/prometheus/alerts.yml

    # ── Scrape Configs ────────────────────────────────────────────────────────
    scrape_configs:

      # Prometheus lui-même
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Application Java — Spring Boot Actuator /actuator/prometheus
      - job_name: 'java-app'
        metrics_path: /actuator/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['production']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Noeuds Kubernetes (kubelet / cAdvisor)
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Pods avec annotation prometheus.io/scrape=true
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      # PostgreSQL (via pod annotations)
      - job_name: 'postgres'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['production']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: postgres

  alerts.yml: |
    groups:
      - name: java-app-alerts
        rules:

          # Application indisponible
          - alert: JavaAppDown
            expr: up{job="java-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Application Java indisponible"
              description: "Le pod {{ $labels.pod }} ne répond plus depuis 1 minute"

          # Mémoire JVM élevée
          - alert: JVMMemoryHigh
            expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Mémoire JVM élevée ({{ $value | humanizePercentage }})"

          # Trop de requêtes en erreur
          - alert: HttpHighErrorRate
            expr: |
              sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Taux d'erreur HTTP > 5%"

          # Pod en CrashLoopBackOff
          - alert: PodCrashLooping
            expr: |
              increase(kube_pod_container_status_restarts_total{namespace="production"}[15m]) > 3
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} redémarre en boucle"
