---
# =============================================================================
# Ansible Inventory — Infrastructure réelle
# PC Hôte        : Ansible controller (localhost)
# Harbor VM      : 192.168.43.133 (user: lms)
# Kubernetes VM  : 192.168.43.109 (user: lms)
# =============================================================================

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    ansible_ssh_private_key_file: ~/.ssh/id_rsa

  children:

    # ── VM Harbor (192.168.43.133) ────────────────────────────────────────────
    harbor:
      hosts:
        harbor-vm:
          ansible_host: 192.168.43.133
          ansible_user: lms
          ansible_become: true
          ansible_become_method: sudo
          harbor_hostname: harbor.local
          harbor_ip: 192.168.43.133
          harbor_version: v2.10.0
          harbor_admin_password: "lmscodeadmin"
          harbor_data_dir: /data/harbor

    # ── VM Kubernetes (192.168.43.109) ────────────────────────────────────────
    kubernetes:
      hosts:
        k8s-master:
          ansible_host: 192.168.43.109
          ansible_user: lms
          ansible_become: true
          ansible_become_method: sudo
          k8s_version: "1.28.0"

    # ── PC Hôte (Ansible controller lui-même) ────────────────────────────────
    localhost:
      hosts:
        control-node:
          ansible_host: 127.0.0.1
          ansible_connection: local
