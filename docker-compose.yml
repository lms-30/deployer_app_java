version: '3.8'

# =============================================================================
# PC HÔTE — SonarQube uniquement
# Jenkins est déjà installé et configuré séparément sous Docker
#
# IPs du projet :
#   PC Hôte        : localhost (SonarQube :9000)
#   Harbor VM      : 192.168.43.133 (harbor.local)
#   Kubernetes VM  : 192.168.43.109
#
# APRÈS docker compose up -d, connecter Jenkins au réseau :
#   docker network connect cicd-net jenkins
# =============================================================================

services:

  # ── SonarQube ─────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_pass_2024
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_CE_JAVAOPTS=-Xmx512m -Xms128m
      - SONAR_WEB_JAVAOPTS=-Xmx512m -Xms128m
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      cicd-net:
        ipv4_address: 172.20.0.3
    depends_on:
      sonar-db:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── PostgreSQL pour SonarQube ─────────────────────────────────────────────
  sonar-db:
    image: postgres:15-alpine
    container_name: sonar-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_pass_2024
      - POSTGRES_DB=sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonar_db_data:

networks:
  cicd-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
